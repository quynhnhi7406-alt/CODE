<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 2 - Modal & Tabs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>

  <div class="container mt-3">
    <h3>Bài tập ứng dụng Modal </h3>
    
    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#myModal">
      Tài khoản
    </button>
  </div>

  <div class="modal fade" id="myModal">
    <div class="modal-dialog modal-lg"> <div class="modal-content">

        <div class="modal-header">
          <h4 class="modal-title">ĐĂNG NHẬP/ ĐĂNG KÝ</h4>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          
          <ul class="nav nav-tabs" role="tablist">
            <li class="nav-item">
              <a class="nav-link active" data-bs-toggle="tab" href="#register">Đăng ký</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" data-bs-toggle="tab" href="#login">Đăng nhập</a>
            </li>
          </ul>

          <div class="tab-content border border-top-0 p-3 bg-light">
            
            <div id="register" class="container tab-pane active"><br>
              <div class="border p-3 rounded bg-white">
                <h3 class="title">Form Đăng Ký Thông Tin</h3>
                <div class="mb-3 mt-3">
                  <label for="fullname" class="form-label">Họ và Tên</label>
                  <input type="text" class="form-control" id="fullname" placeholder="Nhập họ và tên">
                </div>
                <div class="mb-3">
                  <label for="reg-email" class="form-label">Email</label>
                  <input type="email" class="form-control" id="reg-email" placeholder="Nhập email">
                </div>
                <div class="mb-3">
                  <label for="phone" class="form-label">Số Điện Thoại</label>
                  <input type="text" class="form-control" id="phone" placeholder="Nhập số điện thoại">
                </div>
                <div class="mb-3">
                  <label for="reg-pwd" class="form-label">Mật Khẩu</label>
                  <input type="password" class="form-control" id="reg-pwd" placeholder="Nhập mật khẩu">
                </div>
                <div class="mb-3">
                  <label for="confirm-pwd" class="form-label">Xác Nhận Mật Khẩu</label>
                  <input type="password" class="form-control" id="confirm-pwd" placeholder="Xác nhận mật khẩu">
                </div>
                <div class="mb-3">
                  <label class="form-label">Giới Tính:</label>
                  <div class="form-check form-check-inline ms-2">
                    <input class="form-check-input" type="radio" name="gender" id="male" value="nam" checked>
                    <label class="form-check-label" for="male">Nam</label>
                  </div>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" id="female" value="nu">
                    <label class="form-check-label" for="female">Nữ</label>
                  </div>
                </div>
                <div class="mb-3">
                  <label for="language" class="form-label">Ngôn Ngữ</label>
                  <select class="form-select" id="language">
                    <option selected>Tiếng Việt</option>
                    <option value="en">Tiếng Anh</option>
                  </select>
                </div>
                <div class="form-check mb-3">
                  <input class="form-check-input" type="checkbox" id="terms">
                  <label class="form-check-label" for="terms">Tôi đồng ý với các điều khoản và điều kiện</label>
                </div>
                <button type="submit" class="btn btn-primary w-100">Đăng Ký</button>
              </div>
            </div>

            <div id="login" class="container tab-pane fade"><br>
              <div class="border p-3 rounded bg-white">
                <h3 class="title">Form Đăng nhập</h3>
                <div class="mb-3 mt-3">
                  <label for="login-email" class="form-label">Email</label>
                  <input type="text" class="form-control" id="login-email" placeholder="Nhập email">
                </div>
                <div class="mb-3">
                  <label for="login-pwd" class="form-label">Mật Khẩu</label>
                  <input type="password" class="form-control" id="login-pwd" placeholder="Nhập mật khẩu">
                </div>
                <button type="submit" class="btn btn-primary w-100">Đăng Nhập</button>
              </div>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>

</body>

</html>
