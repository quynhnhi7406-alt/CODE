<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<style>
    .title {
        color: red;
        text-align: center;
    }
</style>

<body>
    <div class="container-sm bg-light mt-3 border p-4">
        <h3 class="title">Bảng Thành Phần Dinh Dưỡng</h3>

        <table class="table table-bordered mb-0 bg-white">
            <thead>
                <tr>
                    <th rowspan="2" class=" col-sm-6 bg-warning text-center align-middle ">Thành Phần</th>
                    <th colspan="2" class=" col-sm-6 bg-warning text-center align-middle ">Giá Trị</th>
                </tr>

                <tr>
                    <th class="bg-warning">Khối Lượng</th>
                    <th class="bg-warning">% DV*</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td class="text-start">Calories</td>
                    <td>200 kcal</td>
                    <td>20%</td>
                </tr>

                <tr>
                    <td class="text-start">Chất Béo</td>
                    <td>9 g</td>
                    <td>14%</td>
                </tr>

                <tr>
                    <td class="text-start">Chất Béo Bão Hòa</td>
                    <td>4 g</td>
                    <td>20%</td>
                </tr>

                <tr>
                    <td class="text-start">Chất Đạm</td>
                    <td>8 g</td>
                    <td>16%</td>
                </tr>

                <tr>
                    <td class="text-start">Chất Xơ</td>
                    <td>5 g</td>
                    <td>20%</td>
                </tr>

                <tr>
                    <td class="text-start">Đường</td>
                    <td>12 g</td>
                    <td>-</td>
                </tr>

                <tr>
                    <td rowspan="2" class="text-start">Vitamin</td>
                    <td>Vitamin C</td>
                    <td>25%</td>
                </tr>

                <tr>
                    <td>Vitamin D</td>
                    <td>10%</td>
                </tr>

            </tbody>
        </table>
    </div>
</body>

</html>
